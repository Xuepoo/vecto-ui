<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0a0f" />

  <g stroke="#ffffff" stroke-width="0.5" stroke-linejoin="round">
    <!-- 1. Inner Left Face (Drawn first to be correctly occluded by the right arm of the front face) -->
    <!-- B(30,26) B'(42,14) C'(56,42) C(44,54) -->
    <polygon points="30,26 42,14 56,42 44,54" fill="#ffffff" opacity="0.15" />

    <!-- 2. Outer Right Face -->
    <!-- E(74,26) E'(86,14) F'(56,74) F(44,86) -->
    <polygon points="74,26 86,14 56,74 44,86" fill="#ffffff" opacity="0.15" />

    <!-- 3. Front Face (Drawn last in the body to overlap the inner left face) -->
    <!-- A(14,26) B(30,26) C(44,54) D(58,26) E(74,26) F(44,86) -->
    <polygon points="14,26 30,26 44,54 58,26 74,26 44,86" fill="#ffffff" opacity="0.95" />

    <!-- 4. Top Left Face -->
    <!-- A(14,26) A'(26,14) B'(42,14) B(30,26) -->
    <polygon points="14,26 26,14 42,14 30,26" fill="#ffffff" opacity="0.6" />

    <!-- 5. Top Right Face -->
    <!-- D(58,26) D'(70,14) E'(86,14) E(74,26) -->
    <polygon points="58,26 70,14 86,14 74,26" fill="#ffffff" opacity="0.6" />
  </g>
</svg>
